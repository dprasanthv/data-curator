x-airflow-common: &airflow-common
  build:
    context: ./airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_TOPIC: facebook.events
    LABEL_STUDIO_URL: http://label-studio:8080
    LABEL_STUDIO_USERNAME: admin@datacurator.local
    LABEL_STUDIO_PASSWORD: admin
    QDRANT_URL: http://qdrant:6333
    AIRFLOW__WEBSERVER__SECRET_KEY: "data-curator-secret-key-change-in-prod"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./datalake:/opt/airflow/datalake

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka_data:/var/lib/kafka/data

  producer:
    build:
      context: ./producer
    container_name: facebook-style-producer
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=facebook.events
      - PRODUCER_DELAY_MS=250

  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    command:
      - bash
      - -lc
      - airflow db migrate && airflow users create --username "$${_AIRFLOW_WWW_USER_USERNAME}" --password "$${_AIRFLOW_WWW_USER_PASSWORD}" --firstname Airflow --lastname Admin --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    command:
      - bash
      - -lc
      - airflow webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    command:
      - bash
      - -lc
      - airflow scheduler

  kafbat:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat
    ports:
      - "8082:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

  label-studio:
    image: heartexlabs/label-studio:1.14.0
    container_name: label-studio
    ports:
      - "8081:8080"
    environment:
      - LOCAL_FILES_SERVING_ENABLED=true
      - LOCAL_FILES_DOCUMENT_ROOT=/data
      - LABEL_STUDIO_USERNAME=admin@datacurator.local
      - LABEL_STUDIO_PASSWORD=admin
      - LABEL_STUDIO_ACCESS_TOKEN=local-dev-token
    volumes:
      - ./label-studio-data:/label-studio/data
      - ./datalake:/data

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: qdrant
    ports:
      - "6333:6333"  # REST API + Web UI
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  search-app:
    build:
      context: ./search-app
    container_name: search-app
    ports:
      - "8501:8501"
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./datalake:/data:ro      # for displaying images from Qdrant payload paths
    depends_on:
      - qdrant

volumes:
  kafka_data:
  airflow_pg_data:
  qdrant_data:
